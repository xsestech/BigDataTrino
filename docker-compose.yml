services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - "./data:/data:ro"
      - "./initdb-postgres:/docker-entrypoint-initdb.d:ro"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sales
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sales"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - "./data:/data:ro"
      - "./initdb-clickhouse:/docker-entrypoint-initdb.d:ro"
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  trino:
    image: trinodb/trino:468
    ports:
      - "8080:8080"
    volumes:
      - "./trino/catalog:/etc/trino/catalog:ro"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
